name: New Game Request
description: Suggest a new puzzle game for the platform
title: "[GAME]: "
labels: ["enhancement", "new-game"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new game! Please fill out this form to help us evaluate your idea.
        
        For reference, see our [Game Pipeline Documentation](../docs/GAME_PIPELINE.md).
  
  - type: input
    id: game-name
    attributes:
      label: Game Name
      description: What would you call this game?
      placeholder: "e.g., Water Sort, Pull the Pin"
    validations:
      required: true
  
  - type: textarea
    id: description
    attributes:
      label: Game Description
      description: Describe the core mechanic and objective
      placeholder: |
        Players must...
        The goal is to...
        The challenge comes from...
    validations:
      required: true
  
  - type: input
    id: reference
    attributes:
      label: Reference / Inspiration
      description: Link to existing games, videos, or ads that inspired this
      placeholder: "https://..."
    validations:
      required: false
  
  - type: checkboxes
    id: feasibility
    attributes:
      label: Feasibility Check
      description: Quick filter criteria
      options:
        - label: It's a puzzle (strategy/logic over reflex)
        - label: Can work client-side (no backend needed)
        - label: Touch-friendly (works on phones)
        - label: Has depth (can scale difficulty)
  
  - type: textarea
    id: implementation
    attributes:
      label: Implementation Ideas
      description: Any thoughts on how this could be implemented?
      placeholder: |
        State structure could be...
        Win condition would be...
        Levels could be generated by...
  
  - type: dropdown
    id: priority
    attributes:
      label: Suggested Priority
      description: How excited are you about this game?
      options:
        - "High - Would love to see this soon!"
        - "Medium - Would be nice to have"
        - "Low - Just an idea"
    validations:
      required: true

name: Bug Report
description: Report a bug in a game or the platform
title: "[BUG]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please provide as much detail as possible.
  
  - type: dropdown
    id: game
    attributes:
      label: Affected Game
      description: Which game has the bug?
      options:
        - "Platform (homepage, navigation, etc.)"
        - "Water Sort"
        - "Pull the Pin"
        - "Parking Escape"
        - "Bus Jam"
        - "Other (specify in description)"
    validations:
      required: true
  
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
      placeholder: |
        **What happened:**
        
        **What I expected:**
        
        **Steps to reproduce:**
        1. Go to...
        2. Click...
        3. See error
    validations:
      required: true
  
  - type: textarea
    id: screenshot
    attributes:
      label: Screenshots
      description: If applicable, add screenshots or screen recordings
  
  - type: input
    id: device
    attributes:
      label: Device
      description: What device were you using?
      placeholder: "e.g., iPhone 14, Samsung Galaxy S23, Desktop Chrome"
  
  - type: input
    id: browser
    attributes:
      label: Browser
      description: What browser were you using?
      placeholder: "e.g., Chrome 120, Safari 17, Firefox 121"
  
  - type: textarea
    id: console
    attributes:
      label: Console Errors
      description: Any errors in the browser console? (F12 → Console tab)
      render: shell
